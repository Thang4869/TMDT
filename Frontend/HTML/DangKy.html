<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="/Frontend/CSS/DangKyDangNhap.css">
</head>
<body>
    <div class="form-container">
        <h2>Đăng Ký</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Họ và tên" required>
            <input type="text" id="phone" placeholder="Số điện thoại" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Ký</button>
        </form>
        <p>Đã có tài khoản rồi? <a href="DangNhap.html">Đăng nhập</a></p>
        <p id="message"></p>
    </div>
    <script type="module" src="/Frontend/JS/authService.js"></script>
</body>
</html>
