<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="/Frontend/CSS/DangKyDangNhap.css">
</head>
<body>
    <div class="form-container">
        <h2>Đăng Nhập</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Nhập</button>
        </form>
        <p>Vẫn chưa có tài khoản? <a href="DangKy.html">Đăng ký</a></p>
        <p id="message"></p>
    </div>
    <!-- Module JS mới -->
    <script type="module" src="/Frontend/JS/authService.js"></script>
</body>
</html>
