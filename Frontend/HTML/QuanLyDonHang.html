<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng</title>
    <link rel="stylesheet" href="/Frontend/CSS/QuanLyDonHang.css">
</head>
<body>
    <h1>Đơn Hàng Của Bạn</h1>
    <!-- Tra cứu đơn khách vãng lai -->
    <div style="margin: 20px auto; width: 80%;">
        <input type="text" id="guestOrderId" placeholder="Nhập mã đơn hàng khách vãng lai" style="padding: 10px; width: 70%; border: 1px solid #ddd;">
        <button onclick="fetchGuestOrder()" style="padding: 10px; background: #3498db; color: white; border: none; cursor: pointer;">Tra cứu</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Mã Đơn Hàng</th>
                <th>Tổng Tiền</th>
                <th>Ngày Đặt</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
                <th>Đánh Giá</th>
            </tr>
        </thead>
        <tbody id="order-table-body"></tbody>
    </table>
    <!-- Modal đánh giá -->
    <div id="reviewModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000;">
        <div style="background: #fff; width: 500px; margin: 100px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
            <h2 style="text-align: center; color: #333;">Đánh giá đơn hàng</h2>
            <form id="reviewForm">
                <p>Mã đơn hàng: <span id="reviewOrderId"></span></p>
                <div id="reviewItems"></div>
                <button type="submit" style="background: #3498db; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; width: 100%; cursor: pointer;">Gửi đánh giá</button>
            </form>
            <button onclick="document.getElementById('reviewModal').style.display='none'" style="background: #e74c3c; color: #fff; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer;">Hủy</button>
        </div>
    </div>
    <script src="/Frontend/JS/QuanLyDonHang.js"></script>
</body>
</html>
